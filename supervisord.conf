[supervisord]
nodaemon=true
logfile=/app/logs/supervisord.log
pidfile=/tmp/supervisord.pid

[program:web]
command=gunicorn -b 0.0.0.0:5000 --workers 1 --timeout 120 --preload app:app
directory=/app
autostart=true
autorestart=true
stdout_logfile=/app/logs/web.log
stderr_logfile=/app/logs/web_error.log

[program:scheduler]
command=python3 scripts/scheduler.py
directory=/app
autostart=true
autorestart=true
startsecs=10
stdout_logfile=/app/logs/scheduler.log
stderr_logfile=/app/logs/scheduler_error.log

[program:worker]
command=python3 job_worker.py --poll-interval 10
directory=/app
autostart=true
autorestart=true
startsecs=5
numprocs=2
process_name=%(program_name)s_%(process_num)02d
stdout_logfile=/app/logs/worker_%(process_num)02d.log
stderr_logfile=/app/logs/worker_error_%(process_num)02d.log
