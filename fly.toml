# fly.toml app configuration file generated for radarcheck on 2026-01-06T23:58:42-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'radarcheck'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile'

[mounts]
  source = "radar_cache"
  destination = "/app/cache"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

# Environment variables for tile builder (used by supervisor)
# Tuned for 1GB volume - aggressive cleanup, fewer hours
[env]
  TILE_BUILD_INTERVAL_MINUTES = "15"
  TILE_BUILD_MAX_HOURS_HRRR = "18"
  TILE_BUILD_MAX_HOURS_NAM_NEST = "36"
  TILE_BUILD_MAX_HOURS_GFS = "72"
  TILE_BUILD_MAX_HOURS_NBM = "48"
  TILE_BUILD_MAX_HOURS_ECMWF_HRES = "72"
  # Core precip/snow/temp variables only — keeps GRIB and tile footprint small
  TILE_BUILD_VARIABLES = "apcp,asnow,snod,t2m"
  # Herbie GRIB cache directory (on the volume for persistence)
  HERBIE_SAVE_DIR = "/app/cache/herbie"
  # Keep cache small - synoptic (00/06/12/18z) + hourly runs
  TILE_BUILD_SYNOPTIC_RUNS = "4"
  TILE_BUILD_HOURLY_RUNS = "4"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
